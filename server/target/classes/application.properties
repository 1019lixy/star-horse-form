# HTTPS ??
server.port=8443
# SSL ??
server.ssl.key-store-type=PKCS12
server.ssl.key-store=classpath:ssl-server.p12
server.ssl.key-store-password=123456
server.ssl.key-alias=spring-boot-ssl
server.ssl.enabled-protocols=TLSv1.2,TLSv1.3
# ????
spring.cors.allowed-origins=https://192.168.120.7:5173
spring.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cors.allowed-headers=*
spring.cors.allow-credentials=true
server.servlet.context-path=/api
# 数据库配置
spring.datasource.url=jdbc:h2:mem:webrtcdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.application.name=server-api
# JPA配置
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# H2控制台配置
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# WebSocket配置
spring.messaging.simp.message-size-limit=10485760
spring.messaging.simp.broker-heartbeat-interval=10000
# 日志配置
logging.level.org.springframework.web=INFO
logging.level.org.springframework.messaging=INFO
logging.level.com.starhorse.webrtc.server=DEBUG
# CORS配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# 应用配置
app.websocket.endpoint=/ws
app.websocket.topic-prefix=/topic
app.websocket.queue-prefix=/queue
app.websocket.application-prefix=/app
logging.config=classpath:logback-spring.xml
logging.level.root=info

config.nacos.ip=10.10.10.50
config.nacos.port=9848
spring.cloud.nacos.discovery.server-addr=${config.nacos.ip}:${config.nacos.port}
spring.cloud.nacos.config.import-check.enabled=false
spring.cloud.nacos.config.server-addr=${config.nacos.ip}:${config.nacos.port}
spring.cloud.nacos.config.group=PROD_GROUP
spring.cloud.nacos.config.prefix=application-prod
spring.cloud.nacos.config.file-extension=yml